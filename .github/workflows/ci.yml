name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prettier --check "src/**/*.{ts,tsx,css,json}"
        name: Prettier

      - run: npx eslint
        name: ESLint

      - run: npx tsc --noEmit
        name: TypeScript
